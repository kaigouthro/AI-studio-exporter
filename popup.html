<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Studio Exporter</title>
  <style>
    :root {
      --bg-color: #1a1b1e;
      --card-bg: #25262b;
      --text-primary: #e9ecef;
      --text-secondary: #a5a5a5;
      --accent-color: #667eea;
      --accent-hover: #5a6fd6;
      --border-color: #2c2e33;
      --success-bg: #2b8a3e;
      --success-text: #d3f9d8;
      --error-bg: #c92a2a;
      --error-text: #ffe3e3;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .settings-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      color: var(--text-primary);
      background-color: var(--card-bg);
    }

    .github-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease;
    }

    .github-btn svg {
      width: 22px;
      height: 22px;
      display: block;
      fill: var(--text-secondary);
      transition: fill 0.16s ease, transform 0.16s ease;
    }

    .github-btn:hover {
      transform: translateY(-2px) scale(1.06);
      box-shadow: 0 8px 22px rgba(102, 126, 234, 0.14);
      background-color: rgba(102,126,234,0.07);
    }

    .github-btn:hover svg {
      fill: white;
      transform: scale(1.04);
    }

    .github-btn:focus {
      outline: 2px solid rgba(102,126,234,0.18);
      outline-offset: 2px;
    }

    .content {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border-color);
    }

    .status {
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
    }

    .status.active {
      border-color: #2b8a3e;
      color: #69db7c;
    }

    .status.inactive {
      border-color: #c92a2a;
      color: #ff8787;
    }

    .status-icon {
      font-size: 16px;
    }

    .export-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .export-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .export-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .export-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: var(--border-color);
      color: var(--text-secondary);
    }

    .export-btn.loading {
      opacity: 0.8;
    }

    .export-btn.stop-mode {
      background: linear-gradient(135deg, #ff6b6b 0%, #c92a2a 100%);
    }

    .export-btn.stop-mode:hover {
      box-shadow: 0 4px 12px rgba(201, 42, 42, 0.4);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .message {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      display: none;
    }

    .message.success {
      background-color: rgba(43, 138, 62, 0.2);
      color: #69db7c;
      border: 1px solid rgba(43, 138, 62, 0.3);
      display: block;
    }

    .message.error {
      background-color: rgba(201, 42, 42, 0.2);
      color: #ff8787;
      border: 1px solid rgba(201, 42, 42, 0.3);
      display: block;
    }

    .info {
      margin-top: 15px;
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.5;
      text-align: center;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 10px;
      color: var(--text-secondary);
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>AI Studio Exporter</h1>
      <div style="display:flex; align-items:center; gap:6px;">
        <a id="githubLink" class="github-btn" href="https://github.com/Sukarth/AI-studio-exporter" target="_blank" rel="noopener noreferrer" title="View on GitHub" aria-label="View on GitHub">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 .5C5.73.5.75 5.48.75 11.75c0 4.93 3.19 9.11 7.61 10.58.56.1.76-.24.76-.53 0-.26-.01-1.14-.02-2.07-3.09.67-3.74-1.49-3.74-1.49-.5-1.27-1.22-1.61-1.22-1.61-.99-.68.08-.67.08-.67 1.1.08 1.68 1.13 1.68 1.13.98 1.67 2.57 1.19 3.2.91.1-.71.38-1.19.69-1.46-2.47-.28-5.06-1.24-5.06-5.52 0-1.22.44-2.22 1.16-3.01-.12-.28-.5-1.42.11-2.96 0 0 .95-.3 3.11 1.15a10.78 10.78 0 0 1 2.83-.38c.96 0 1.93.13 2.83.38 2.16-1.46 3.11-1.15 3.11-1.15.61 1.54.23 2.68.11 2.96.72.79 1.16 1.79 1.16 3.01 0 4.29-2.6 5.24-5.08 5.51.39.34.74 1.02.74 2.06 0 1.49-.01 2.69-.01 3.06 0 .29.2.64.77.53C19.06 20.86 22.25 16.68 22.25 11.75 22.25 5.48 17.27.5 12 .5z"/>
          </svg>
        </a>
        <button id="settingsBtn" class="settings-btn" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
        </button>
      </div>
    </div>

    <div class="content">
      <div id="status" class="status inactive">
        <span class="status-icon">⚠️</span>
        <span id="statusText">Not on AI Studio</span>
      </div>

      <button id="exportBtn" class="export-btn" disabled>
        <span id="btnText">Export Conversation</span>
      </button>

      <div id="message" class="message"></div>

      <div class="info">
        Navigate to a conversation and click Export to download as ZIP
      </div>
    </div>

    <div class="footer">
      Version 1.0.1 <br>
      &copy; 2026 Sukarth A
    </div>
  </div>

  <script src="settings.js"></script>
  <script src="popup.js"></script>
</body>

</html>
